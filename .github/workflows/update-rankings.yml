name: Update rankings data

on:
  schedule:
    - cron: '0 22 * * 4'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Update rankings JSON
        run: npm run update:data

      - name: Build check
        run: npm run build

      - name: Commit updated rankings
        uses: stefanzweifel/git-auto-commit-action@v6
        with:
          commit_message: 'Data: update Masters Swimming rankings'
          file_pattern: public/data/rankings.json
